[package]
name = "completio-index"
version = "0.0.0"
description = "Project definition indexer and vector search CLI"
edition = "2024"
license-file = "LICENSE.md"
authors = ["Sasha Koss <koss@nocorp.me>"]
repository = "https://github.com/kossnocorp/completio"

[[bin]]
name = "completio-index"
path = "src/main.rs"

[dependencies]
anyhow = "1.0"
bytemuck = { version = "1.23", features = ["extern_crate_std"] }
clap = { version = "4.5", features = ["derive"] }
ignore = "0.4"
oxc_allocator = "0.122.0"
oxc_ast = "0.122.0"
oxc_ast_visit = "0.122.0"
oxc_parser = "0.122.0"
oxc_span = "0.122.0"
oxc_syntax = "0.122.0"
proc-macro2 = { version = "1.0", features = ["span-locations"] }
rusqlite = { version = "0.39", features = ["bundled"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sqlite-vec = "0.1.7"
syn = { version = "2.0", features = ["full", "visit"] }
xxhash-rust = { version = "0.8", features = ["xxh3"] }
